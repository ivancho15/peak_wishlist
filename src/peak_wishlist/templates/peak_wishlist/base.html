<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Peak Wishlist | {% block title %} {% endblock title %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #f8f9fa; /* Gris muy claro */
      }
      .navbar {
        background-color: #2c3e50 !important; /* Azul oscuro/grisáceo tipo roca */
      }
      .navbar-brand {
        font-weight: 700;
        letter-spacing: 1px;
      }
      .main-container {
        min-height: 80vh;
        margin-top: 2rem;
        margin-bottom: 2rem;
        background: white;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      footer {
        background-color: #2c3e50;
        color: white;
        padding: 1rem 0;
        margin-top: auto;
      }
      .table-container-custom {
        background: white;
        border-radius: 12px;
        overflow: hidden; /* Para que los bordes redondeados corten la tabla */
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .table-custom thead {
            background-color: #2c3e50; /* Tu azul de montaña */
            color: white;
        }
        .table-custom th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 15px !important;
        }
        .table-custom td {
            padding: 12px 15px !important;
            vertical-align: middle;
        }
        .table-custom tbody tr:hover {
            background-color: #f1f4f7;
            transition: background-color 0.2s ease;
        }
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
      <div class="container">
        <a class="navbar-brand" href="{% url 'peak_wishlist:index' %}">
          🏔️ PEAK WISHLIST
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'peak_wishlist:index' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'peak_wishlist:pais' %}">Países</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'peak_wishlist:montanas' %}">Montañas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Excursiones</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'peak_wishlist:proyecto' %}">Proyectos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container main-container">
        {% block contenido %}
        {% endblock contenido %}
    </main>

    <footer class="text-center mt-auto">
      <div class="container">
        <p class="mb-0">&copy; 2026 Peak Wishlist - Track Your Summits</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
